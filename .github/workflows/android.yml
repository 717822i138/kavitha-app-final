name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build Web Production Assets
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor to Android
        working-directory: frontend
        run: |
          npx capacitor init "Kavitha Medicals" "com.prabhu.kavithamedicals" --web-dir=dist
          npx capacitor add android || true
          npx capacitor sync android

      - name: Build Android APK (Debug)
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Kavitha-Medicals-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
